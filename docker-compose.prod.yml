services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: testlink
      CLICKHOUSE_USER: testlink
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD: "testlink123"
      TZ: Asia/Shanghai
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  app:
    image: whpan/testlink:latest
    ports:
      - "9080:8080"
    environment:
      TESTLINK_CLICKHOUSE_HOST: clickhouse
      TESTLINK_REDIS_HOST: redis
      TESTLINK_ADMIN_TOKEN: "change-me-admin-token"
      TESTLINK_JWT_SECRET: "change-me-random-string"
      TESTLINK_TRUSTED_PROXY_CIDRS: "127.0.0.1,10.0.0.0/8"
      TZ: Asia/Shanghai
    depends_on:
      - clickhouse
      - redis
    restart: unless-stopped

