server:
  port: 8080
  trusted_proxies: 1
  # 生产环境建议填反代/负载均衡的真实 CIDR，例如 ["127.0.0.1", "10.0.0.0/8"]。
  # 填了此项会优先于 trusted_proxies，避免无条件信任所有 X-Forwarded-For。
  trusted_proxy_cidrs: []

clickhouse:
  host: localhost
  port: 9000
  database: testlink
  username: testlink
  password: "testlink123"

redis:
  host: localhost
  port: 6379
  password: ""

auth:
  jwt_secret: "testlink123!"
  admin_token: "testlink123!"

geoip:
  ip2region_v4: "ip2region_v4.xdb"
  ip2region_v6: "ip2region_v6.xdb"
  maxmind_country: "GeoLite2-Country.mmdb"
  maxmind_asn: "GeoLite2-ASN.mmdb"

ratelimit:
  session_per_ip_per_min: 5
  report_per_ip_per_min: 60
  global_session_per_sec: 100
